<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SchoolWithEase — Aurora · Responsive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Kalam:wght@300;400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shell-base.css">
<link rel="stylesheet" href="shell-themes.css">
<link rel="stylesheet" href="aurora.css">
<link rel="stylesheet" href="aurora-responsive.css">
<style>
  html, body { margin: 0; height: 100%; background: #07060f; }
  .bezel { border-radius: 34px; overflow: hidden; box-shadow: 0 0 0 1px rgba(255,255,255,.10), 0 30px 70px -30px rgba(0,0,0,.8); position: relative; height: 100%; }
  .bezel.desk { border-radius: 18px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="shell-build.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "theme": "light",
    "accent": "#5b8cff",
    "secondary": "#ff6fae"
  }/*EDITMODE-END*/;

  function Shell({ theme, accent, secondary, label, bezel }) {
    const a = accent === TWEAK_DEFAULTS.accent ? null : accent;
    const s = secondary === TWEAK_DEFAULTS.secondary ? null : secondary;
    return (
      <div className={"bezel " + (bezel || "")}>
        <div className="device" dangerouslySetInnerHTML={{ __html: window.buildShell('aurora', theme, label, { accent: a, accent2: s }) }} />
      </div>
    );
  }

  function App() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
    const p = { theme: t.theme, accent: t.accent, secondary: t.secondary };
    return (
      <React.Fragment>
        <DesignCanvas initialZoom={0.62}>
          <DCSection id="responsive" title="Aurora — one shell, every screen" subtitle="The same dashboard reflows via container queries: mobile · tablet · desktop">
            <DCArtboard id="mobile" label="Mobile · 390×844" width={390} height={844}>
              <Shell {...p} label="Aurora · mobile" bezel="phone" />
            </DCArtboard>
            <DCArtboard id="tablet" label="Tablet · 820×1100" width={820} height={1100}>
              <Shell {...p} label="Aurora · tablet" bezel="tab" />
            </DCArtboard>
            <DCArtboard id="desktop" label="Desktop · 1440×900" width={1440} height={900}>
              <Shell {...p} label="Aurora · desktop" bezel="desk" />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>

        <TweaksPanel title="Tweaks">
          <TweakSection label="Appearance" />
          <TweakRadio label="Mode" value={t.theme} options={['dark', 'light']} onChange={(v) => setTweak('theme', v)} />
          <TweakSection label="Neon palette" />
          <TweakColor label="Primary / accent" value={t.accent}
            options={['#5b8cff', '#8c5cff', '#22d3ee', '#2ee6a6', '#ff6fae']}
            onChange={(v) => setTweak('accent', v)} />
          <TweakColor label="Secondary" value={t.secondary}
            options={['#ff6fae', '#8c5cff', '#2ee6a6', '#ffce5c', '#22d3ee']}
            onChange={(v) => setTweak('secondary', v)} />
        </TweaksPanel>
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
