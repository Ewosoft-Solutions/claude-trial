<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SchoolWithEase — Layout A · Hi-Fi Directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Public+Sans:wght@400;500;600;700;800&family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shell-base.css">
<link rel="stylesheet" href="shell-themes.css">
<style>
  html, body { margin: 0; height: 100%; background: #f0eee9; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="shell-build.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
  const W = 1440, H = 900;

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "accent": "#2563eb",
    "secondary": "#0ea5e9"
  }/*EDITMODE-END*/;

  function Shell({ dir, theme, label, accent, secondary }) {
    return <div style={{ width: '100%', height: '100%' }}
      dangerouslySetInnerHTML={{ __html: window.buildShell(dir, theme, label, { accent, accent2: secondary }) }} />;
  }

  const DIRS = [
    { id: 'beacon', label: 'Beacon · calm, institutional' },
    { id: 'ledger', label: 'Ledger · crisp, data-dense' },
    { id: 'harbor', label: 'Harbor · warm, human' },
  ];

  function App() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
    return (
      <React.Fragment>
      <DesignCanvas>
        <DCSection id="light" title="Layout A — three-column shell" subtitle="Three visual directions of the same registrar dashboard · light">
          {DIRS.map((d) => (
            <DCArtboard key={d.id} id={d.id + '-l'} label={d.label} width={W} height={H}>
              <Shell dir={d.id} theme="light" label={d.label + ' · light'} accent={t.accent === TWEAK_DEFAULTS.accent ? null : t.accent} secondary={t.secondary === TWEAK_DEFAULTS.secondary ? null : t.secondary} />
            </DCArtboard>
          ))}
        </DCSection>
        <DCSection id="dark" title="Dark mode" subtitle="Same three directions, dark — both themes built to parity">
          {DIRS.map((d) => (
            <DCArtboard key={d.id} id={d.id + '-d'} label={d.label} width={W} height={H}>
              <Shell dir={d.id} theme="dark" label={d.label + ' · dark'} accent={t.accent === TWEAK_DEFAULTS.accent ? null : t.accent} secondary={t.secondary === TWEAK_DEFAULTS.secondary ? null : t.secondary} />
            </DCArtboard>
          ))}
        </DCSection>
      </DesignCanvas>

      <TweaksPanel>
        <TweakSection label="Brand color" />
        <TweakColor label="Primary / accent" value={t.accent}
          options={['#0f766e', '#2563eb', '#4f46e5', '#7c5cff', '#c2452f', '#0d7a52']}
          onChange={(v) => setTweak('accent', v)} />
        <TweakColor label="Secondary" value={t.secondary}
          options={['#0ea5e9', '#ef9d2a', '#8b5cf6', '#ec4899', '#84cc16', '#f43f5e']}
          onChange={(v) => setTweak('secondary', v)} />
        <TweakButton label="Reset colors"
          onClick={() => { setTweak('accent', TWEAK_DEFAULTS.accent); setTweak('secondary', TWEAK_DEFAULTS.secondary); }} />
      </TweaksPanel>
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
