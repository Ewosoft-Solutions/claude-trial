<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline · School With Ease</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0; min-height: 100vh; display: grid; place-items: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #f8fafc; color: #0f172a;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #0b1120; color: #e2e8f0; }
      }
      .card { max-width: 22rem; padding: 2rem; text-align: center; }
      img { width: 56px; height: 56px; }
      h1 { font-size: 1.15rem; margin: 1rem 0 0.35rem; }
      p { margin: 0; font-size: 0.9rem; opacity: 0.75; }
      button {
        margin-top: 1.5rem; padding: 0.5rem 1rem; border-radius: 8px;
        border: 1px solid #cbd5e1; background: transparent; color: inherit;
        font: inherit; cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="/icon.svg" alt="School With Ease" />
      <h1>You're offline</h1>
      <p>This page isn't available without a connection. Reconnect and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
