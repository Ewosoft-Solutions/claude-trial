name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build, Lint, Type-check, Test
    runs-on: ubuntu-latest

    services:
      postgres:
        # pgvector/pgvector is the official pgvector build of postgres:16 —
        # needed since the learning_domain migration (CREATE EXTENSION vector).
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: schoolwithease
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Owner URL used by migrations and db:rls:check
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/schoolwithease
      # Runtime URL — same DB, restricted role created by migrations
      APP_RUNTIME_DATABASE_URL: postgresql://app_runtime:app_runtime_pw@localhost:5432/schoolwithease
      # NestJS / JWT
      JWT_SECRET: ci-secret-not-for-production
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node 22
        uses: actions/setup-node@v7
        with:
          # Node ≥20.19 required by repo engines; UI jsdom suite needs it too
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.34.5

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=low

      # ── Database ──────────────────────────────────────────────────────────
      - name: Run migrations
        working-directory: packages/database
        run: pnpm db:deploy

      - name: Grant app_runtime LOGIN for CI
        run: |
          echo "ALTER ROLE app_runtime LOGIN PASSWORD 'app_runtime_pw';" | \
            pnpm --filter @workspace/database exec prisma db execute --stdin

      - name: RLS coverage check (gate)
        working-directory: packages/database
        run: pnpm db:rls:check

      - name: Privileged DB usage check (gate)
        working-directory: apps/api
        run: pnpm check:privileged-db

      # ── Build shared packages (needed for type-check of apps) ────────────
      - name: Build packages/database
        working-directory: packages/database
        run: pnpm build

      - name: Build packages/api
        working-directory: packages/api
        run: pnpm build

      - name: Build packages/vitest-config
        working-directory: packages/vitest-config
        run: pnpm build

      - name: Build packages/jest-config
        working-directory: packages/jest-config
        run: pnpm build

      # ── Type-check ────────────────────────────────────────────────────────
      - name: Type-check packages/database
        working-directory: packages/database
        run: pnpm exec tsc -p tsconfig.json --noEmit

      - name: Type-check apps/api
        working-directory: apps/api
        run: pnpm check-types

      - name: Type-check apps/web
        working-directory: apps/web
        run: pnpm check-types

      # ── Lint ──────────────────────────────────────────────────────────────
      - name: Lint apps/api
        run: pnpm exec eslint --config apps/api/eslint.config.mjs "apps/api/{src,apps,libs,test}/**/*.ts"

      - name: Lint apps/web
        working-directory: apps/web
        run: pnpm lint

      # ── Build apps ────────────────────────────────────────────────────────
      - name: Build apps/api
        working-directory: apps/api
        run: pnpm build

      # Production boot smoke — catches prod-only boot gates (config validation,
      # DI, the ENCRYPTION_KEY fail-closed check) that NODE_ENV=test never
      # exercises. This is the class of failure that took down a Render deploy:
      # a missing ENCRYPTION_KEY crashed the instance on boot, yet CI stayed
      # green because it runs NODE_ENV=test. Uses the app_runtime DB CI already
      # provisions; /healthz (liveness) only answers once every boot hook passed.
      - name: Production boot smoke (apps/api)
        working-directory: apps/api
        env:
          NODE_ENV: production
          PORT: "3999"
        run: |
          set -uo pipefail

          # 1) Fail-closed: production MUST refuse to boot without ENCRYPTION_KEY.
          if timeout 60 node dist/main > /tmp/noenc.log 2>&1; then
            echo "✖ Booted in production with NO ENCRYPTION_KEY — the boot gate is not firing."
            cat /tmp/noenc.log
            exit 1
          fi
          if ! grep -qi "ENCRYPTION_KEY" /tmp/noenc.log; then
            echo "✖ Boot failed, but not with the expected ENCRYPTION_KEY error:"
            cat /tmp/noenc.log
            exit 1
          fi
          echo "✔ Production refuses to boot without ENCRYPTION_KEY."

          # 2) Positive: boots and serves /healthz with a valid 32-byte key.
          export ENCRYPTION_KEY="$(openssl rand -base64 32)"
          node dist/main > /tmp/boot.log 2>&1 &
          PID=$!
          for _ in $(seq 1 40); do
            if curl -fsS "http://localhost:3999/healthz" > /dev/null 2>&1; then
              echo "✔ Production boot healthy (/healthz)."
              kill "$PID" 2>/dev/null || true
              exit 0
            fi
            if ! kill -0 "$PID" 2>/dev/null; then
              echo "✖ API exited during production boot:"
              cat /tmp/boot.log
              exit 1
            fi
            sleep 2
          done
          echo "✖ Timed out waiting for /healthz in production mode:"
          cat /tmp/boot.log
          kill "$PID" 2>/dev/null || true
          exit 1

      - name: Build apps/web
        working-directory: apps/web
        run: pnpm build

      # ── Tests ─────────────────────────────────────────────────────────────
      - name: Test packages/ui (vitest — requires Node ≥20.19)
        working-directory: packages/ui
        run: pnpm test

      - name: Test apps/web (vitest)
        working-directory: apps/web
        run: pnpm test

      - name: Test apps/api (jest unit)
        working-directory: apps/api
        run: pnpm test

      - name: Test apps/api e2e — RLS isolation
        working-directory: apps/api
        run: pnpm test:e2e
        # e2e specs skip automatically when APP_RUNTIME_DATABASE_URL is not set;
        # here it IS set, so the isolation specs run for real.
