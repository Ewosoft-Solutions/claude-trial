name: CD (demo)

# Continuous delivery to the DEMO environment.
#
# Trigger: runs only AFTER the "CI" workflow completes successfully on `main`,
# so nothing deploys unless the full gate (build/lint/typecheck/tests/RLS
# coverage/e2e isolation) passed on that exact commit.
#
# Flow (see docs/deployment-plan.md §5):
#   migrate (owner role)  →  deploy-api (Render)  →  deploy-web (Vercel)  →  smoke
#
# Migrations run HERE (not as a Render pre-deploy hook): `prisma` is a devDep and
# the migrations live in packages/database, so CI is the natural place to run
# them as the DB owner while the runtime container only ever boots as
# app_runtime (ADR-004). Forward-only/additive migrations keep the brief
# expand-contract window (new schema, old code) safe.
#
# ── Required GitHub secrets (Environment: demo) ──────────────────────────────
#   DATABASE_URL_OWNER   Render Postgres OWNER external conn (…?sslmode=require)
#   RENDER_API_KEY       Render API key (Account Settings → API Keys)
#   RENDER_API_SERVICE   Render service id for swe-api (srv-…)
#   API_BASE_URL         Public API origin, e.g. https://api.demo.schoolwithease.com
#   WEB_BASE_URL         Public web origin, e.g. https://demo.schoolwithease.com
#   VERCEL_TOKEN         Vercel access token
#   VERCEL_ORG_ID        Vercel org/team id
#   VERCEL_PROJECT_ID    Vercel project id (the apps/web project)
# Note: set the Render service `autoDeploy: false` (see render.yaml) so Render
# does not ALSO deploy on push — this workflow is the single deploy path.

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

# Never run two demo deploys at once; do not cancel an in-flight deploy.
concurrency:
  group: cd-demo
  cancel-in-progress: false

permissions:
  contents: read

env:
  PNPM_VERSION: 10.34.5
  NODE_VERSION: 22

jobs:
  migrate:
    name: DB migrate (owner)
    runs-on: ubuntu-latest
    environment: demo
    # Gate: only proceed when the CI run we are reacting to actually passed.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout the CI-tested commit
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply migrations (prisma migrate deploy, owner role)
        working-directory: packages/database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_OWNER }}
        run: pnpm db:deploy

  deploy-api:
    name: Deploy API (Render)
    runs-on: ubuntu-latest
    environment: demo
    needs: migrate
    steps:
      - name: Trigger Render deploy
        id: trigger
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_API_SERVICE: ${{ secrets.RENDER_API_SERVICE }}
        run: |
          set -euo pipefail
          deploy_id=$(curl -fsS -X POST \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/${RENDER_API_SERVICE}/deploys" \
            -d '{"clearCache":"do_not_clear"}' | jq -r '.id')
          if [ -z "$deploy_id" ] || [ "$deploy_id" = "null" ]; then
            echo "Failed to create a Render deploy"; exit 1
          fi
          echo "Render deploy: $deploy_id"
          echo "deploy_id=$deploy_id" >> "$GITHUB_OUTPUT"

      - name: Wait for Render deploy to go live
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_API_SERVICE: ${{ secrets.RENDER_API_SERVICE }}
          DEPLOY_ID: ${{ steps.trigger.outputs.deploy_id }}
        run: |
          set -euo pipefail
          # Poll up to ~20 min. `live` = success; the *_failed / canceled states
          # are terminal failures. Render's health check (/healthz) already gates
          # the cutover, so `live` means the new instance passed readiness.
          for i in $(seq 1 80); do
            status=$(curl -fsS \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              "https://api.render.com/v1/services/${RENDER_API_SERVICE}/deploys/${DEPLOY_ID}" \
              | jq -r '.status')
            echo "[$i] status=$status"
            case "$status" in
              live) echo "Deploy is live."; exit 0 ;;
              build_failed|update_failed|canceled|deactivated|pre_deploy_failed)
                echo "Deploy failed: $status"; exit 1 ;;
            esac
            sleep 15
          done
          echo "Timed out waiting for the deploy to go live"; exit 1

  deploy-web:
    name: Deploy Web (Vercel)
    runs-on: ubuntu-latest
    environment: demo
    needs: deploy-api
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout the CI-tested commit
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}

      # `vercel build` runs here, not on Vercel's builders, so it executes our
      # install/build commands (pnpm + Turbo) in this runner's environment.
      # Vercel provisions pnpm on its own infrastructure; a GitHub runner does
      # not, so install it explicitly or the build fails with `pnpm: not found`.
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # Vercel builds from the monorepo root; the project's Root Directory
      # (apps/web) + apps/web/vercel.json drive the Turbo build of web's
      # workspace deps. VERCEL_ORG_ID / VERCEL_PROJECT_ID link the project.
      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy (prebuilt)
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"

  smoke:
    name: Smoke test
    runs-on: ubuntu-latest
    environment: demo
    needs: [deploy-api, deploy-web]
    steps:
      - name: API liveness + readiness
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          set -euo pipefail
          echo "GET ${API_BASE_URL}/healthz"
          curl -fsS "${API_BASE_URL}/healthz"
          echo
          # /readyz returns 200 only when the app_runtime DB connection + RLS
          # self-test pass, so a green smoke here proves runtime isolation is live.
          echo "GET ${API_BASE_URL}/readyz"
          curl -fsS "${API_BASE_URL}/readyz"
          echo

      # The web app never exposes the API directly: the browser only ever calls
      # same-origin /api/* routes, which the Next server proxies to the Nest API
      # using NEXT_PUBLIC_API_URL. That variable lives in Vercel's project
      # settings (pulled by `vercel pull` at build time) — NOT in these secrets —
      # so a perfectly healthy API and a green deploy can still ship a web app
      # that cannot reach it. Nothing above would notice. This step does.
      #
      # Both probes are unauthenticated. The first is a purpose-built health
      # endpoint (`/api/health`) where the web server calls the API and reports
      # the round-trip: 200 = reachable, 503 = it could not reach the API. The
      # second expects a NON-2xx on purpose — the point there is not that the
      # endpoint succeeds, but that the Next server reached the API and
      # forwarded *its* answer (a DTO 400). A 5xx/000 on either means the web
      # app itself is down or the round-trip never happened.
      - name: Web → API round-trip (proxy reachability)
        env:
          WEB_BASE_URL: ${{ secrets.WEB_BASE_URL }}
        run: |
          set -euo pipefail

          # probe <method> <path> <expected-status> <what-it-proves> [curl args…]
          probe() {
            local method="$1" path="$2" expected="$3" why="$4"
            shift 4
            local got
            got=$(curl -sS -o /dev/null -w '%{http_code}' \
                    -X "$method" "$@" "${WEB_BASE_URL}${path}" || echo "000")

            if [ "$got" = "$expected" ]; then
              printf '  ok    %-6s %-22s -> %s  (%s)\n' "$method" "$path" "$got" "$why"
              return 0
            fi

            printf '  FAIL  %-6s %-22s -> %s, expected %s  (%s)\n' \
              "$method" "$path" "$got" "$expected" "$why"
            case "$got" in
              5*)
                echo "        A 5xx here means the Next server could not reach the API."
                echo "        Check NEXT_PUBLIC_API_URL in Vercel -> Settings -> Environment"
                echo "        Variables (Production). It must be a full origin including the"
                echo "        scheme, e.g. https://api.demo.schoolwithease.com"
                echo "        Then REDEPLOY: NEXT_PUBLIC_* is inlined at build time, so"
                echo "        changing the value without a rebuild has no effect." ;;
              000)
                echo "        No HTTP response at all — ${WEB_BASE_URL} is unreachable (DNS/TLS)." ;;
            esac
            return 1
          }

          echo "Probing ${WEB_BASE_URL} …"
          failed=0

          # Purpose-built connectivity probe: the web server calls the API's
          # /healthz through the same API_BASE the real proxy uses and reports
          # the result. 200 = the round-trip works. 503 = it could not reach the
          # API (body says why); 000/5xx = the web app itself is down.
          if ! probe GET /api/health 200 \
                 "web server reached the API (/api/health round-trip)"; then
            failed=1
            # This endpoint explains itself — surface its body verbatim.
            echo "        /api/health said:"
            curl -sS --max-time 15 "${WEB_BASE_URL}/api/health" \
              | sed 's/^/          /' || true
          fi

          # The login route does NOT use api-proxy — it has its own two-step
          # handler, so exercise it separately. An invalid body is rejected by
          # the DTO layer before any credential check, which means no failed
          # login attempt and no account-lockout state is written by CD.
          probe POST /api/auth/login 400 \
            "login route reaches the API and forwards DTO validation" \
            -H 'Content-Type: application/json' \
            --data '{"email":"not-an-email","password":""}' || failed=1

          if [ "$failed" -ne 0 ]; then
            echo
            echo "Web -> API wiring is broken. The API is healthy (checked above);"
            echo "the web app cannot talk to it."
            exit 1
          fi
          echo "Web -> API round-trip OK."
